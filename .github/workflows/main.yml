name: Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Use Node 18
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: "Create env file"
        run: |
          touch .env
          echo TEST_ACCESS_TOKEN_SECRET = access_secret >> .env
          echo TEST_REFRESH_TOKEN_SECRET = refresh_secret >> .env
          cat .env

      - name: Check OpenAPI spec is up to date
        run: |
          npm run openapi:generate
          git diff --exit-code openapi.json || (echo "::error::openapi.json is out of date. Run 'npm run openapi:generate' and commit the result." && exit 1)

      - name: Run tests
        run: npm run test-CI
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
