components:
  schemas:
    TaskResponse:
      type: object
      description: Task information returned by API endpoints.
      properties:
        task_id:
          type: integer
          description: Unique task identifier.
          example: 1
        task_type_id:
          type: integer
          description: Task type ID.
        task_type:
          type: string
          description: Task type label.
          enum:
            - EXPORT
            - DELETE
            - UPDATE
            - IMPORT
            - IMPORT_BACKUP
            - EXPORT_BACKUP
            - IMPORT_CTD
            - IMPORT_ECO_TAXA
          example: "IMPORT"
        task_status_id:
          type: integer
          description: Task status ID.
        task_status:
          type: string
          description: Task status label.
          enum:
            - PENDING
            - RUNNING
            - WAITING_FOR_RESPONSE
            - DONE
            - ERROR
          example: "DONE"
        task_owner_id:
          type: integer
          description: User ID of the task owner.
        task_owner:
          type: string
          description: Display name of the task owner.
        task_project_id:
          type: integer
          description: Associated project ID.
        task_params:
          type: object
          description: Task-specific parameters.
        task_creation_date:
          type: string
          description: Task creation date.
          example: "2024-01-15T10:30:00.000Z"
        task_start_date:
          type: string
          description: Task start date.
        task_end_date:
          type: string
          description: Task end date.
        task_log_file_path:
          type: string
          description: Path to the task log file.
        task_progress_pct:
          type: number
          description: Task progress percentage (0-100).
          minimum: 0
          maximum: 100
          example: 100
        task_progress_msg:
          type: string
          description: Current progress message.
        task_result:
          type: string
          description: Task result summary.
        task_error:
          type: string
          description: Task error message if failed.
        task_question:
          type: string
          description: Question to user (for WAITING_FOR_RESPONSE status).
        task_reply:
          type: string
          description: User reply to the question.
        task_step:
          type: string
          description: Current task step identifier.

    TaskSearchResponse:
      type: object
      description: Paginated task search results.
      properties:
        search_info:
          $ref: "#/components/schemas/SearchInfo"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskResponse"
